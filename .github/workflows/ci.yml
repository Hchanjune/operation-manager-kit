name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spring-boot-version: [ '3.2.12', '3.5.14', '4.0.6' ]

    name: Spring Boot ${{ matrix.spring-boot-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.spring-boot-version }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ matrix.spring-boot-version }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build -x test -PspringBootVersion=${{ matrix.spring-boot-version }}

      - name: Test
        run: ./gradlew test -PspringBootVersion=${{ matrix.spring-boot-version }}

      - name: JaCoCo Aggregated Report
        if: matrix.spring-boot-version == '4.0.6'
        run: ./gradlew jacocoAggregatedReport -PspringBootVersion=${{ matrix.spring-boot-version }}

      - name: JaCoCo Coverage Gate
        if: matrix.spring-boot-version == '4.0.6'
        run: ./gradlew jacocoCoverageGate -PspringBootVersion=${{ matrix.spring-boot-version }}

      - name: Upload Coverage Report
        if: always() && matrix.spring-boot-version == '4.0.6'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/aggregated/html
